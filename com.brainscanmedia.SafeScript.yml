app-id: com.brainscanmedia.SafeScript
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: SafeScript
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: SafeScript
    buildsystem: qmake
    no-make-install: true
    sources:
      - type: git
        url: https://github.com/BrainScanMedia/SafeScript.git
        tag: v1.2.6
        commit: 43e8e79128920af647c2a4f1881d3fde4bfaa3ce
    post-install:
      - install -Dm755 SafeScript /app/bin/SafeScript
      - install -Dm644 safescript.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 safescript.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - desktop-file-edit --set-key=Icon --set-value=${FLATPAK_ID} /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
